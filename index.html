<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trek24 – Vehicle Tracking</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: #fff;
  margin: 0;
}

.chat-box {
  max-width: 420px;
  margin: 40px auto;
  background: #1e1e1e;
  border-radius: 12px;
  padding: 16px;
  height: 420px;
  overflow-y: auto;
}

.msg {
  padding: 10px;
  margin: 8px 0;
  border-radius: 10px;
  font-size: 14px;
}

.bot { background: #2a2a2a; }
.user { background: #e02020; text-align: right; }

.options {
  max-width: 420px;
  margin: auto;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 10px;
}

button {
  padding: 8px 12px;
  border-radius: 20px;
  border: 1px solid #e02020;
  background: transparent;
  color: #ff7070;
  cursor: pointer;
}

button:hover {
  background: rgba(224,32,32,0.2);
}

.wa-btn {
  width: 100%;
  background: #25d366;
  color: #fff;
  padding: 12px;
  border: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="chat-box" id="chat"></div>
<div class="options" id="options"></div>

<script>
const WA_NUMBER = '263775594799';

// 🔥 STORE PACKAGE
let selectedPackage = "";

const flows = {
  start: {
    bot: "Hey 👋 Welcome to Trek24.\n\nWe install GPS trackers — once-off payment, no monthly fees.\n\nWhat do you need?",
    options: ["Track my car", "See packages"]
  },

  packages: {
    bot: "Choose a package:\n\n🔹 Trek-Lite ($65)\n🔸 Trek-Standard ($75)\n⭐ Trek-Premium ($100)",
    options: ["Trek-Lite ($65)", "Trek-Standard ($75)", "Trek-Premium ($100)"]
  },

  ready: {
    bot: "Perfect 🔥\n\nTap below to continue on WhatsApp.\n\nPlease include:\n📍 Your location\n⏰ Preferred installation time",
    options: [],
    wa: true
  }
};

const map = {
  "Track my car": "packages",
  "See packages": "packages",
  "Trek-Lite ($65)": "ready",
  "Trek-Standard ($75)": "ready",
  "Trek-Premium ($100)": "ready"
};

const chat = document.getElementById('chat');
const options = document.getElementById('options');

function addMsg(text, type) {
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function buildOptions(opts, waMode) {
  options.innerHTML = '';

  if (waMode) {
    const btn = document.createElement('button');
    btn.className = 'wa-btn';
    btn.innerText = "Continue on WhatsApp";

    btn.onclick = () => {
      let cleanPackage = selectedPackage.replace(/\(\$\d+\)/, '').trim();

      const message = cleanPackage
        ? `Hi Trek24! I'm interested in the ${cleanPackage}.\n\n📍 My location:\n⏰ Preferred installation time:`
        : `Hi Trek24! I'm interested in your tracking service.\n\n📍 My location:\n⏰ Preferred installation time:`;

      window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
    };

    options.appendChild(btn);
    return;
  }

  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.innerText = opt;

    btn.onclick = () => {
      addMsg(opt, 'user');

      // 🔥 SAVE PACKAGE
      if (opt.includes("Lite") || opt.includes("Standard") || opt.includes("Premium")) {
        selectedPackage = opt;
      }

      const next = map[opt];
      if (next) showFlow(next);
    };

    options.appendChild(btn);
  });
}

function showFlow(key) {
  const flow = flows[key];
  if (!flow) return;

  setTimeout(() => {
    addMsg(flow.bot, 'bot');
    buildOptions(flow.options, flow.wa);
  }, 400);
}

// START
showFlow('start');
</script>

</body>
</html>
